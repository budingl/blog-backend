# 本地开发环境专属配置
spring:
  # 本地数据库配置（适配SSH隧道）
  datasource:
    driver-class-name: org.postgresql.Driver  # 新增：指定驱动类
    url: jdbc:postgresql://localhost:5432/blog?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&connectTimeout=10000
    username: xiaojiu
    password: xiaojiu
    # 连接池配置（解决连接超时/重置问题）
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  # 本地调试配置
  devtools:
    restart:
      enabled: true  # 热部署（本地开发用）
    livereload:
      enabled: true  # 新增：前端热重载

# 本地日志配置（更详细）
logging:
  level:
    com.example: DEBUG  # 本地调试开启 DEBUG 日志
    root: DEBUG
    org.hibernate: DEBUG  # 新增：Hibernate调试日志

