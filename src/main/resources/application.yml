# 公共配置：所有环境共享的属性
spring:
  application:
    name: blog-backend
  profiles:
    active: dev  # 默认使用 dev 环境
  # JPA 通用配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# 通用服务器配置
server:
  port: ${SERVER_PORT:5000}
  servlet:
    context-path: /api

# 日志通用配置
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO

# JWT 通用配置
jwt:
  secret: ${JWT_SECRET:HsJn6b7LDU8HoSiR1iS1+CG/f7e8dW8kqy7pkz6LSrs=}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh:
    expiration: ${JWT_REFRESH_EXPIRATION:604800000}
